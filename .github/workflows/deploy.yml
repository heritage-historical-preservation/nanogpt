name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: the job exchanges a GitHub token for AWS creds — no stored secrets.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::485161492380:role/nanogpt-sacred-brandon-github-actions

jobs:
  deploy-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate foundation template
        working-directory: infra/foundation
        run: sam validate --lint

      - name: Deploy foundation stack
        working-directory: infra/foundation
        run: sam deploy --no-progressbar

  deploy-etl:
    needs: deploy-foundation
    runs-on: ubuntu-latest
    env:
      ECR_REPO: 485161492380.dkr.ecr.us-east-1.amazonaws.com/nanogpt-sacred-brandon
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Log in to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin "$ECR_REPO"

      - name: Build and push ETL image
        run: |
          docker build -f services/etl/Dockerfile -t "$ECR_REPO:etl-${{ github.sha }}" -t "$ECR_REPO:etl-latest" .
          docker push "$ECR_REPO:etl-${{ github.sha }}"
          docker push "$ECR_REPO:etl-latest"

      - name: Validate and deploy ETL stack
        working-directory: infra/etl
        run: |
          sam validate --lint
          sam deploy --no-progressbar \
            --parameter-overrides "EtlImageUri=$ECR_REPO:etl-${{ github.sha }}"
